<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.name">NetProxy</title>

    <style>
      #fouc-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 99999;
        transition: opacity 0.15s ease-out;
      }
      #fouc-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("theme") || "auto";
          var html = document.documentElement;
          html.classList.remove("mdui-theme-light", "mdui-theme-dark", "mdui-theme-auto");
          var isDark = savedTheme === "dark" || (savedTheme === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (savedTheme === "light") html.classList.add("mdui-theme-light");
          else if (savedTheme === "dark") html.classList.add("mdui-theme-dark");
          else html.classList.add("mdui-theme-auto");
          var style = document.createElement("style");
          var fallbackColor = isDark ? "#141218" : "#fef7ff";
          style.textContent = "#fouc-overlay { background-color: " + (savedTheme === "auto" ? "var(--background, " + fallbackColor + ")" : fallbackColor) + "; }";
          document.head.appendChild(style);
        } catch (e) {
          document.documentElement.classList.add("mdui-theme-auto");
        }
      })();
    </script>

    <link rel="stylesheet" href="/material-icons.css" />
    <link rel="stylesheet" href="/twemoji.css" />
    <link rel="stylesheet" href="https://mui.kernelsu.org/internal/insets.css" />
    <link rel="stylesheet" href="https://mui.kernelsu.org/internal/colors.css" />
    <link rel="stylesheet" href="/src/styles/monet.css" />
    <link rel="stylesheet" href="/src/styles/index.css" />
  </head>

  <body>
    <div id="fouc-overlay"></div>

    <script>
      (function () {
        function hideOverlay() {
          var overlay = document.getElementById("fouc-overlay");
          if (overlay) {
            overlay.classList.add("fade-out");
            setTimeout(function () { overlay.remove(); }, 150);
          }
        }
        function checkStylesLoaded() {
          var testEl = document.createElement("div");
          testEl.style.cssText = "position:absolute;visibility:hidden;";
          document.body.appendChild(testEl);
          var mduiLoaded = getComputedStyle(testEl).getPropertyValue("--mdui-color-primary") !== "";
          testEl.remove();
          return mduiLoaded;
        }
        function tryHideOverlay() {
          if (checkStylesLoaded()) hideOverlay();
          else requestAnimationFrame(tryHideOverlay);
        }
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", tryHideOverlay);
        else requestAnimationFrame(tryHideOverlay);
        setTimeout(hideOverlay, 2000);
      })();
    </script>

    <mdui-layout>
      <mdui-top-app-bar>
        <div style="width: 24px"></div>
        <mdui-top-app-bar-title data-i18n="app.name">NetProxy</mdui-top-app-bar-title>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon icon="edit" id="edit-dashboard-btn" style="display: none"></mdui-button-icon>
      </mdui-top-app-bar>

      <mdui-layout-main id="main-content">
        <!-- Status Page -->
        <div id="status-page" class="page active">
          <div class="dashboard-grid" id="dashboard-grid">
            <div class="common-card full-width height-2 speed-card" id="card-speed">
              <div class="card-delete-btn"><mdui-icon name="close"></mdui-icon></div>
              <div class="card-header">
                <mdui-icon name="speed" class="card-icon"></mdui-icon>
                <span class="card-title" data-i18n="status.network_chart">网络速度</span>
                <div class="header-speed-text" id="header-speed-text"></div>
              </div>
              <div class="card-content"><div class="chart-area" id="speed-chart-container"></div></div>
            </div>

            <div class="common-card half-width height-2 mode-card" id="card-mode">
              <div class="card-delete-btn"><mdui-icon name="close"></mdui-icon></div>
              <div class="card-header">
                <mdui-icon name="call_split" class="card-icon"></mdui-icon>
                <span class="card-title" data-i18n="status.outbound_mode">出站模式</span>
              </div>
              <div class="card-content">
                <div class="mode-options">
                  <div class="mode-option active" id="mode-rule" data-mode="rule">
                    <div class="mode-radio"></div>
                    <span class="mode-label" data-i18n="status.mode_rule">规则</span>
                  </div>
                  <div class="mode-option" id="mode-global" data-mode="global">
                    <div class="mode-radio"></div>
                    <span class="mode-label" data-i18n="status.mode_global">全局</span>
                  </div>
                  <div class="mode-option" id="mode-direct" data-mode="direct">
                    <div class="mode-radio"></div>
                    <span class="mode-label" data-i18n="status.mode_direct">直连</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="common-card half-width height-1" id="card-external-ip">
              <div class="card-delete-btn"><mdui-icon name="close"></mdui-icon></div>
              <div class="card-header">
                <mdui-icon name="network_check" class="card-icon" id="network-detection-icon"></mdui-icon>
                <span class="card-title" data-i18n="status.network_detection">网络检测</span>
              </div>
              <div class="card-content"><div class="card-value" id="external-ip"><span class="loading-spinner"></span></div></div>
            </div>

            <div class="common-card half-width height-1" id="card-internal-ip">
              <div class="card-delete-btn"><mdui-icon name="close"></mdui-icon></div>
              <div class="card-header">
                <mdui-icon name="devices" class="card-icon"></mdui-icon>
                <span class="card-title" data-i18n="status.internal_ip">内网IP</span>
              </div>
              <div class="card-content"><div class="card-value" id="internal-ip"><span class="loading-spinner"></span></div></div>
            </div>

            <div class="common-card half-width height-2 traffic-card" id="card-traffic">
              <div class="card-delete-btn"><mdui-icon name="close"></mdui-icon></div>
              <div class="card-header">
                <mdui-icon name="data_saver_off" class="card-icon"></mdui-icon>
                <span class="card-title" data-i18n="status.traffic_today">流量统计</span>
              </div>
              <div class="card-content">
                <div class="traffic-donut-container">
                  <div class="donut-chart-wrapper" id="traffic-donut">
                    <svg viewBox="0 0 100 100" class="active">
                      <circle cx="50" cy="50" r="35" fill="none" stroke="var(--monet-secondary, #2196F3)" stroke-width="10" stroke-dasharray="109.96 219.91" transform="rotate(-90 50 50)"></circle>
                      <circle cx="50" cy="50" r="35" fill="none" stroke="var(--monet-primary, #4CAF50)" stroke-width="10" stroke-dasharray="109.96 219.91" stroke-dashoffset="-109.96" transform="rotate(-90 50 50)"></circle>
                    </svg>
                  </div>
                  <div class="traffic-legend">
                    <div class="legend-item"><span class="legend-color upload"></span><span data-i18n="status.upload">上传</span></div>
                    <div class="legend-item"><span class="legend-color download"></span><span data-i18n="status.download">下载</span></div>
                  </div>
                </div>
                <div class="traffic-stats">
                  <div class="traffic-stat-row">
                    <span class="stat-label"><mdui-icon name="arrow_upward" style="color: var(--monet-primary, #4caf50)"></mdui-icon><span data-i18n="status.upload">上传</span></span>
                    <span><span class="stat-value" id="traffic-upload">0</span><span class="stat-unit">MB</span></span>
                  </div>
                  <div class="traffic-stat-row">
                    <span class="stat-label"><mdui-icon name="arrow_downward" style="color: var(--monet-secondary, #2196f3)"></mdui-icon><span data-i18n="status.download">下载</span></span>
                    <span><span class="stat-value" id="traffic-download">0</span><span class="stat-unit">MB</span></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Add Widget Panel -->
          <div id="add-widget-panel" class="add-widget-panel">
            <div class="add-widget-header">
              <span class="title" data-i18n="dashboard.add_widget">添加组件</span>
              <mdui-button-icon icon="close" id="close-add-widget-btn"></mdui-button-icon>
            </div>
            <div class="add-widget-list" id="add-widget-list"></div>
          </div>
        </div>

        <!-- Config Page -->
        <div id="config-page" class="page">
          <div class="container">
            <mdui-card variant="elevated">
              <div style="padding: 20px">
                <div style="display: flex; align-items: center; justify-content: between; margin-bottom: 16px;">
                  <h2 style="margin: 0; font-size: 20px; flex-grow: 1" data-i18n="config.management">节点管理</h2>
                  <mdui-dropdown id="import-menu">
                    <mdui-button slot="trigger" icon="add" id="add-config-btn" data-i18n="common.add">添加</mdui-button>
                    <mdui-menu>
                      <mdui-menu-item id="import-node-link"><span data-i18n="config.add_node">添加节点</span></mdui-menu-item>
                      <mdui-menu-item id="import-full-config"><span data-i18n="config.add_outbound">添加出站</span></mdui-menu-item>
                      <mdui-menu-item id="import-subscription"><span data-i18n="config.add_sub">添加订阅</span></mdui-menu-item>
                    </mdui-menu>
                  </mdui-dropdown>
                </div>
                <mdui-tabs id="config-tabs"><mdui-tab value="loading" data-i18n="common.loading">加载中...</mdui-tab></mdui-tabs>
              </div>
            </mdui-card>
          </div>
        </div>

        <!-- Settings Page -->
        <div id="settings-page" class="page">
          <div class="container">
            <mdui-list>
              <mdui-list-item icon="settings_applications" id="settings-module-entry"><span data-i18n="settings.module">模块设置</span><mdui-icon slot="end-icon" name="chevron_right"></mdui-icon></mdui-list-item>
              <mdui-divider></mdui-divider>
              <mdui-list-item icon="language" id="settings-language-entry"><span data-i18n="settings.language">语言设置</span><mdui-icon slot="end-icon" name="chevron_right"></mdui-icon></mdui-list-item>
              <mdui-divider></mdui-divider>
              <mdui-list-item icon="article" id="settings-logs-entry"><span data-i18n="settings.logs">日志</span><mdui-icon slot="end-icon" name="chevron_right"></mdui-icon></mdui-list-item>
            </mdui-list>
          </div>
        </div>

        <!-- Language Page -->
        <div id="language-page" class="page">
          <div class="container">
            <mdui-card variant="elevated" class="compact-card">
              <div style="padding: 16px">
                <h3 style="margin: 0 0 8px" data-i18n="settings.language">语言设置</h3>
                <mdui-segmented-button-group id="language-group" selects="single" value="auto" style="width: 100%">
                  <mdui-segmented-button value="auto">Auto</mdui-segmented-button>
                  <mdui-segmented-button value="zh-CN">中文</mdui-segmented-button>
                  <mdui-segmented-button value="en-US">English</mdui-segmented-button>
                  <mdui-segmented-button value="ru-RU">Русский</mdui-segmented-button>
                </mdui-segmented-button-group>
              </div>
            </mdui-card>
            <div style="padding: 16px; text-align: center">
              <mdui-button variant="outlined" id="language-back-btn" icon="arrow_back" data-i18n="common.back_settings">返回设置</mdui-button>
            </div>
          </div>
        </div>
      </mdui-layout-main>

      <mdui-navigation-bar value="status" id="nav-bar">
        <mdui-navigation-bar-item icon="home" value="status" data-i18n="nav.status">状态</mdui-navigation-bar-item>
        <mdui-navigation-bar-item icon="article" value="config" data-i18n="nav.config">节点</mdui-navigation-bar-item>
        <mdui-navigation-bar-item icon="settings" value="settings" data-i18n="nav.settings">设置</mdui-navigation-bar-item>
      </mdui-navigation-bar>
    </mdui-layout>

    <div class="dashboard-fab" id="dashboard-fab">
      <mdui-fab id="service-fab" icon="play_arrow" data-i18n="status.running_text"></mdui-fab>
    </div>

    <!-- FIXED: Changed /src/main.ts to /src/app.ts -->
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
