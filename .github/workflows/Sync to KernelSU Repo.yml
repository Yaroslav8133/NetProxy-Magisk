name: Синхронизация с KernelSU Repo

# Условия срабатывания
on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    name: Синхронизация
    runs-on: ubuntu-latest
    steps:
      - name: Получение исходного кода
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          # Важное исправление: запрещаем плагину checkout перехватывать учетные данные Git
          persist-credentials: false 

      - name: Синхронизация кода и тегов
        env:
          DEST_REPO: "https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/KernelSU-Modules-Repo/netproxy.git"
        run: |
          git remote add downstream "$DEST_REPO"
          
          # Принудительная отправка всех веток в целевой репозиторий
          git push downstream --all --force
          
          # Отправка тегов (игнорируем ошибки для защищенных тегов)
          git push downstream --tags || true
          
          echo "Отправка исходного кода завершена! Защищенные теги пропущены."

      - name: Синхронизация последнего релиза
        # Запускать только при создании нового Release или ручном запуске
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          UPSTREAM_REPO: ${{ github.repository }} # Текущий репозиторий
          DEST_REPO: "KernelSU-Modules-Repo/netproxy" # Целевой репозиторий
        run: |
          # 1. Получаем имя тега последнего релиза из основного репозитория
          LATEST_TAG=$(gh release view --repo $UPSTREAM_REPO --json tagName -q .tagName)
          echo "Последний релиз в основном репозитории: $LATEST_TAG"
          
          # 2. Проверяем, существует ли этот релиз в целевом репозитории
          if gh release view $LATEST_TAG --repo $DEST_REPO &>/dev/null; then
            echo "Релиз $LATEST_TAG уже есть в целевом репозитории, синхронизация не требуется."
          else
            echo "Релиз $LATEST_TAG отсутствует в целевом репозитории, начинаем синхронизацию..."
            
            # 3. Создаем временную директорию и скачиваем все файлы релиза
            mkdir -p release_assets
            gh release download $LATEST_TAG --repo $UPSTREAM_REPO --dir release_assets
            
            # 4. Получаем заголовок и описание (логи изменений) релиза
            TITLE=$(gh release view $LATEST_TAG --repo $UPSTREAM_REPO --json name -q .name)
            NOTES=$(gh release view $LATEST_TAG --repo $UPSTREAM_REPO --json body -q .body)
            
            # 5. Создаем идентичный релиз в целевом репозитории и загружаем файлы
            gh release create $LATEST_TAG ./release_assets/* --repo $DEST_REPO --title "$TITLE" --notes "$NOTES"
            
            echo "Релиз $LATEST_TAG успешно синхронизирован!"
          fi
