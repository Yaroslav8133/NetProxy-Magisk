name: Сборка модуля и уведомления

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/module/**'
      - 'src/webui/**'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Сборка
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.get_version.outputs.commit_count }}
    steps:
      - name: Получение кода
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Настройка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/webui/package-lock.json
      
      - name: Настройка Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Установка зависимостей WebUI
        working-directory: src/webui
        run: npm install

      - name: Обновление versionCode
        id: get_version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          sed -i "s/^versionCode=.*/versionCode=$COMMIT_COUNT/" src/module/module.prop
          echo "versionCode обновлен до: $COMMIT_COUNT"
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

      - name: Сборка WebUI
        run: python src/webui/build_webui.py

      - name: Загрузка артефактов сборки
        uses: actions/upload-artifact@v7
        with:
          name: NetProxy-Module
          path: src/module/

  notify:
    name: Отправка уведомлений
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Скачивание артефактов сборки
        if: ${{ needs.build.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: NetProxy-Module
          path: src/module

      - name: Упаковка модуля
        if: ${{ needs.build.result == 'success' }}
        run: |
          COMMIT_COUNT=${{ needs.build.outputs.commit_count }}
          # Чтение version из module.prop
          VERSION=$(grep '^version=' src/module/module.prop | cut -d= -f2)
          ZIP_NAME="NetProxy_${VERSION}_${COMMIT_COUNT}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          
          cd src/module
          zip -r "../../$ZIP_NAME" .
          cd ..

      - name: Отправка модуля в Telegram
        if: ${{ needs.build.result == 'success' }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CAPTION="Уведомление об успешной сборке модуля
          
          Файл: \`${{ env.ZIP_NAME }}\`
          Описание:
          \`\`\`
          $COMMIT_MSG
          \`\`\`

          [История коммитов](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          [Лог сборки](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          curl -v -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
               -F "document=@${{ env.ZIP_NAME }}" \
               -F "message_thread_id=2275" \
               -F "parse_mode=Markdown" \
               -F "caption=$CAPTION" \
               https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

      - name: Уведомление об ошибке
        if: ${{ needs.build.result == 'failure' }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          thread-id: 2275
          parse-mode: markdown
          message: |
            Уведомление об ошибке сборки модуля!
            
            Описание:
            ```
            $COMMIT_MSG
            ```

            [История коммитов](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            [Лог сборки](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Уведомление о релизе
        if: ${{ github.event_name == 'release' }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          thread-id: 2343
          parse-mode: markdown
          message: |
            Уведомление о выходе новой версии!
            
            Версия: `${{ github.event.release.tag_name }}`
            
            [Посмотреть список изменений](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }})
            
            [Скачать модуль](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/NetProxy-Module.zip)
