# Сборка сайта VitePress и его развертывание на GitHub Pages
name: Развертывание сайта VitePress на Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Получение кода
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Настройка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Настройка Pages
        uses: actions/configure-pages@v5

      - name: Установка зависимостей
        run: npm ci
        working-directory: docs

      - name: Сборка с помощью VitePress
        run: npm run build
        working-directory: docs

      - name: Загрузка артефактов
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  # Задание развертывания
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Развертывание
    steps:
      - name: Развертывание на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
